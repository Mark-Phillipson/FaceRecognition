name: Azure Static Web Apps CI/CD - FaceRecognition

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FaceRecognition.Client/FaceRecognition.Client.csproj

      - name: Build and publish
        run: |
          dotnet publish FaceRecognition.Client/FaceRecognition.Client.csproj -c Release

      - name: Show published artifact
        run: |
          echo "Listing FaceRecognition.Client/bin/Release/net10.0"
          ls -la FaceRecognition.Client/bin/Release/net10.0 || true
          echo "Listing FaceRecognition.Client/bin/Release/net10.0/wwwroot"
          ls -la FaceRecognition.Client/bin/Release/net10.0/wwwroot || true
          echo "Listing FaceRecognition.Client/bin/Release/net10.0/publish/wwwroot"
          ls -la FaceRecognition.Client/bin/Release/net10.0/publish/wwwroot || true
          echo "Index file present in publish/wwwroot?"
          if [ -f FaceRecognition.Client/bin/Release/net10.0/publish/wwwroot/index.html ]; then echo "index.html found in publish/wwwroot"; else echo "index.html missing in publish/wwwroot"; fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "FaceRecognition.Client/bin/Release/net10.0/publish/wwwroot"
          api_location: ""
          output_location: ""
          skip_app_build: true
